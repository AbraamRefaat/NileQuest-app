# jdk.net.unixdomain.tmpdir: Java AF_UNIX sockets fail in the default user temp dir
# on this machine (space in username) -> "Unable to establish loopback connection"
# -Xmx2G: machine has ~14GB RAM; 4G heap caused daemon OOM crashes during builds
org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -Djdk.net.unixdomain.tmpdir=C:\\Temp
android.useAndroidX=true
android.enableJetifier=true

